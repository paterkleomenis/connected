Builds:
  - versionName: 3.2.4
    versionCode: 30204
    commit: fdroid-3.2.4
    subdir: android
    # NDK version used to build the Rust core via cargo-ndk. Adjust to match
    # the version the upstream release was built with if the build fails.
    ndk: r27c
    sudo:
      - apt-get update || true
      - apt-get install -y curl
    build:
      # Install the Rust toolchain. The Gradle build invokes `cargo ndk`
      # itself (via the pre*ReleaseBuild tasks), so cargo must be on PATH for
      # the Gradle step below.
      - export PATH="$HOME/.cargo/bin:$PATH"
      - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
      - cargo install cargo-ndk
      - rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android i686-linux-android
      - cd android
      # Produce an *unsigned* APK so F-Droid can sign it with the repo key.
      - cat > /tmp/unsigned.gradle <<'GRADLE'
        allprojects {
            afterEvaluate { p ->
                if (p.plugins.hasPlugin('com.android.application') || p.plugins.hasPlugin('com.android.library')) {
                    if (p.android.hasProperty('signingConfigs')) {
                        p.android.signingConfigs.configureEach { it.enabled = false }
                    }
                    if (p.android.hasProperty('buildTypes')) {
                        p.android.buildTypes.configureEach { it.signingConfig = null }
                    }
                }
            }
        }
        GRADLE
      - ./gradlew --no-daemon assembleStandaloneRelease -I /tmp/unsigned.gradle
    # Heavy build artifacts that must not be scanned as source.
    scandelete:
      - target
      - android/app/src/main/jniLibs
      - android/build
      - android/.gradle
    scanignore:
      - android/app/src/main/kotlin/uniffi

