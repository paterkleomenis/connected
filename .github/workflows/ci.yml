name: CI
run-name: ${{ github.event_name == 'schedule' && 'Security Audit' || (github.event_name == 'pull_request' && github.event.pull_request.title) || 'CI' }}

on:
  pull_request:
    branches: ["main", "master"]
  push:
    branches: ["main", "master"]
    tags-ignore: ["*"]
  schedule:
    # Run security audit daily at 5 AM UTC
    - cron: "0 5 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # -------------------------------------------------------------------------
  # Job 1: Pre-commit Hooks Check
  # -------------------------------------------------------------------------
  pre-commit:
    name: Pre-commit Hooks
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev pkg-config libdbus-1-dev libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libglib2.0-dev

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Cache pre-commit hooks
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit hooks
        run: SKIP=fmt,clippy,check,test,typos,taplo-format pre-commit run --all-files --show-diff-on-failure

  # -------------------------------------------------------------------------
  # Job 2: Code Quality (formatting, linting, typos)
  # -------------------------------------------------------------------------
  quality:
    name: Code Quality (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            components: rustfmt clippy
            targets:
              - x86_64-unknown-linux-gnu
              - x86_64-linux-android
              - aarch64-linux-android
              - armv7-linux-androideabi
              - i686-linux-android

          - name: Windows
            os: windows-latest
            components: clippy
            targets:
              - x86_64-pc-windows-msvc
              - aarch64-pc-windows-msvc

          - name: macOS
            os: macos-26
            components: clippy
            targets:
              - x86_64-apple-darwin
              - aarch64-apple-darwin
              - x86_64-apple-ios
              - aarch64-apple-ios
              - aarch64-apple-ios-sim

    runs-on: ${{ matrix.os }}
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        if: matrix.name == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev pkg-config libdbus-1-dev libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libglib2.0-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: ${{ matrix.components }}
          targets: ${{ join(matrix.targets, ',') }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: quality-${{ matrix.name }}

      - name: Install cargo tools
        if: matrix.name == 'Linux'
        run: cargo install typos-cli taplo-cli cargo-ndk --locked

      - name: Check formatting
        if: matrix.name == 'Linux'
        run: cargo fmt -- --check

      - name: Check TOML formatting
        if: matrix.name == 'Linux'
        run: taplo fmt --check

      - name: Lint with Clippy
        shell: bash
        run: |
          for target in ${{ join(matrix.targets, ' ') }}; do
            echo "::group::clippy ($target)"
            case "$target" in
              *android*)
                cargo ndk -t "$target" clippy -p connected-core -p connected-ffi -- -D warnings
                ;;
              *apple-ios*)
                cargo clippy -p connected-core -p connected-ffi --target "$target" -- -D warnings
                ;;
              *)
                cargo clippy --workspace --target "$target" -- -D warnings
                ;;
            esac
            echo "::endgroup::"
          done

      - name: Check typos
        if: matrix.name == 'Linux'
        run: typos

  # -------------------------------------------------------------------------
  # Job 3: Security Audit
  # -------------------------------------------------------------------------
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev pkg-config libdbus-1-dev libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libglib2.0-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "security"

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run security audit
        run: cargo audit

      - name: Check licenses and bans
        run: |
          cargo install cargo-deny --locked
          cargo deny check

  # -------------------------------------------------------------------------
  # Job 4: Linux Build
  # -------------------------------------------------------------------------
  build-linux:
    name: Linux Build (${{ matrix.arch }})
    needs: [pre-commit, quality, security]
    if: github.event_name != 'schedule'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "linux-build-${{ matrix.arch }}"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev pkg-config libdbus-1-dev libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev

      - name: Build
        run: cargo build --workspace --verbose

      - name: Run tests
        run: cargo test --workspace --verbose

      - name: Rename binary
        run: mv target/debug/connected-desktop target/debug/connected-desktop-linux-${{ matrix.arch }}

      - name: Upload Linux Build
        uses: actions/upload-artifact@v7
        with:
          path: target/debug/connected-desktop-linux-${{ matrix.arch }}
          archive: false

  # -------------------------------------------------------------------------
  # Job 5: AppImage Build
  # -------------------------------------------------------------------------
  build-appimage:
    name: AppImage Build (${{ matrix.arch }})
    needs: [pre-commit, quality, security]
    if: github.event_name != 'schedule'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            artifact: connected-appimage-x86_64
            build-args: "--arch x86_64"
          - arch: aarch64
            runner: ubuntu-24.04-arm
            artifact: connected-appimage-aarch64
            build-args: "--arch aarch64"
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "linux-build-${{ matrix.arch }}"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev pkg-config libdbus-1-dev libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev fuse libfuse2 zsync

      - name: Build AppImage
        run: |
          chmod +x packaging/linux/build-appimage.sh
          packaging/linux/build-appimage.sh ${{ matrix.build-args }}

      - name: Upload AppImage Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            target/connected-desktop-${{ matrix.arch }}.AppImage
            target/connected-desktop-${{ matrix.arch }}.AppImage.zsync
          if-no-files-found: error

  # -------------------------------------------------------------------------
  # Job 6: Flatpak Build
  # -------------------------------------------------------------------------
  build-flatpak:
    name: Flatpak Build (${{ matrix.arch }})
    needs: [pre-commit, quality, security]
    if: github.event_name != 'schedule'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged
    steps:
      - uses: actions/checkout@v6

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: com.paterkleomenis.Connected.flatpak
          manifest-path: packaging/flatpak/com.paterkleomenis.Connected.yml
          arch: ${{ matrix.arch }}

  # -------------------------------------------------------------------------
  # Job 7: Windows Build
  # -------------------------------------------------------------------------
  build-windows:
    name: Windows Build (${{ matrix.arch }})
    runs-on: windows-latest
    needs: [pre-commit, quality, security]
    if: github.event_name != 'schedule'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            arch: x86_64
          - target: aarch64-pc-windows-msvc
            arch: aarch64
    steps:
      - uses: actions/checkout@v6

      - name: Verify installer version matches Cargo version
        shell: pwsh
        run: |
          $cargoMatch = (Get-Content Cargo.toml | Select-String -Pattern '^\s*version\s*=\s*"([^"]+)"' -AllMatches | Select-Object -Last 1)
          if ($null -eq $cargoMatch) { throw "Could not find workspace version in Cargo.toml" }
          $cargo = $cargoMatch.Matches[0].Groups[1].Value
          $wxs = "packaging\\windows\\installer.wxs"
          $msiMatch = (Get-Content $wxs | Select-String -Pattern "^\s*Version=['`"`]([^'`"`]+)['`"`]" | Select-Object -First 1)
          if ($null -eq $msiMatch) { throw "Could not find Version in installer.wxs" }
          $msiVer = $msiMatch.Matches[0].Groups[1].Value
          if ($msiVer -ne $cargo) {
            throw "installer.wxs Version ($msiVer) does not match Cargo.toml workspace version ($cargo)."
          }

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Configure ARM64 Windows C toolchain
        if: matrix.target == 'aarch64-pc-windows-msvc'
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (!(Test-Path $vswhere)) { throw "vswhere.exe not found" }
          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Llvm.Clang -property installationPath
          if (-not $vsPath) {
            throw "Visual Studio LLVM component (clang-cl) is not installed on this runner"
          }

          $msvcToolsRoot = Join-Path $vsPath "VC\Tools\MSVC"
          if (!(Test-Path $msvcToolsRoot)) { throw "MSVC tools not found at $msvcToolsRoot" }
          $msvcVersionDir = Get-ChildItem -Path $msvcToolsRoot -Directory | Sort-Object Name -Descending | Select-Object -First 1
          if ($null -eq $msvcVersionDir) { throw "Could not locate an MSVC version under $msvcToolsRoot" }
          $msvcBinDir = Join-Path $msvcVersionDir.FullName "bin\Hostx64\arm64"
          $linker = Join-Path $msvcBinDir "link.exe"
          if (!(Test-Path $linker)) { throw "ARM64 linker not found at $linker" }

          $clangDir = Join-Path $vsPath "VC\Tools\Llvm\x64\bin"
          $clang = Join-Path $clangDir "clang-cl.exe"
          if (!(Test-Path $clang)) { throw "clang-cl.exe not found at $clang" }

          $llvmLib = Join-Path $clangDir "llvm-lib.exe"
          if (!(Test-Path $llvmLib)) { throw "llvm-lib.exe not found at $llvmLib" }

          "$clangDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "CC_aarch64_pc_windows_msvc=$clang" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CXX_aarch64_pc_windows_msvc=$clang" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "AR_aarch64_pc_windows_msvc=$llvmLib" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CARGO_TARGET_AARCH64_PC_WINDOWS_MSVC_LINKER=$linker" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "windows-build-${{ matrix.target }}"

      - name: Build
        shell: pwsh
        run: |
          if ("${{ matrix.target }}" -eq "x86_64-pc-windows-msvc") {
            cargo build --verbose
          } else {
            cargo build --target ${{ matrix.target }} --verbose
          }

      - name: Clean up WebView2 Ghost Languages
        shell: pwsh
        run: |
          Get-ChildItem -Path target/ -Recurse -Directory | Where-Object { $_.Name -match '^[a-z]{2}(-[A-Za-z]+)?$' -and (Test-Path "$($_.FullName)\WebView2Loader.dll.mui" -or Test-Path "$($_.FullName)\Microsoft.Web.WebView2.Core.dll.mui") } | Remove-Item -Recurse -Force

      - name: Build Windows x64 MSIX
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/build-msix.ps1 -Arch x64 -Profile debug

      - name: Build Windows ARM64 MSIX
        if: matrix.target == 'aarch64-pc-windows-msvc'
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/build-msix.ps1 -Arch arm64 -Profile debug

      - name: Upload Windows x64 MSIX
        if: matrix.target == 'x86_64-pc-windows-msvc'
        uses: actions/upload-artifact@v7
        with:
          path: target/msix/x64/connected-desktop-windows-x64.msix
          name: connected-desktop-windows-x64.msix
          archive: false

      - name: Upload Windows ARM64 MSIX
        if: matrix.target == 'aarch64-pc-windows-msvc'
        uses: actions/upload-artifact@v7
        with:
          path: target/msix/arm64/connected-desktop-windows-arm64.msix
          name: connected-desktop-windows-arm64.msix
          archive: false

  # -------------------------------------------------------------------------
  # Job 8: Bundle Windows MSIX
  # -------------------------------------------------------------------------
  bundle-windows-msix:
    name: Bundle Windows MSIX
    runs-on: windows-latest
    needs: [build-windows]
    if: github.event_name != 'schedule'
    steps:
      - name: Download Windows x64 MSIX
        uses: actions/download-artifact@v8
        with:
          name: connected-desktop-windows-x64.msix
          path: bundle-input

      - name: Download Windows ARM64 MSIX
        uses: actions/download-artifact@v8
        with:
          name: connected-desktop-windows-arm64.msix
          path: bundle-input

      - name: Build MSIX Bundle
        shell: pwsh
        run: |
          $inDir = "bundle-input"
          $x64 = Join-Path $inDir "connected-desktop-windows-x64.msix"
          $arm64 = Join-Path $inDir "connected-desktop-windows-arm64.msix"
          if (!(Test-Path $x64)) { throw "Missing x64 MSIX: $x64" }
          if (!(Test-Path $arm64)) { throw "Missing ARM64 MSIX: $arm64" }

          $outDir = "target\msix"
          New-Item -ItemType Directory -Path $outDir -Force | Out-Null
          $bundlePath = Join-Path $outDir "connected-desktop-windows.msixbundle"

          $sdkRoot = Join-Path ${env:ProgramFiles(x86)} "Windows Kits\10\bin"
          if (!(Test-Path $sdkRoot)) { throw "Windows SDK tools not found at $sdkRoot" }
          $makeAppx = Get-ChildItem -Path $sdkRoot -Recurse -Filter makeappx.exe |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if ($null -eq $makeAppx) { throw "makeappx.exe not found" }

          & $makeAppx.FullName bundle /d $inDir /p $bundlePath /o
          if ($LASTEXITCODE -ne 0) { throw "makeappx bundle failed with exit code $LASTEXITCODE" }

      - name: Upload Windows MSIX Bundle
        uses: actions/upload-artifact@v7
        with:
          path: target/msix/connected-desktop-windows.msixbundle
          name: connected-desktop-windows.msixbundle
          archive: false

  # -------------------------------------------------------------------------
  # Job 9: macOS Build
  # -------------------------------------------------------------------------
  build-macos:
    name: macOS Build
    runs-on: macos-26
    needs: [pre-commit, quality, security]
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "macos-build"

      - name: Build macOS App Bundle
        run: |
          chmod +x packaging/macos/build-macos.sh
          packaging/macos/build-macos.sh
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_DEVELOPER_ID_CERTIFICATE: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE }}
          APPLE_DEVELOPER_ID_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_PASSWORD }}
          APPLE_DEVELOPER_ID_TEAM_ID: ${{ secrets.APPLE_DEVELOPER_ID_TEAM_ID }}

      - name: Run tests
        run: cargo test --workspace --verbose

      - name: Prepare macOS artifact
        run: cp target/macos-build/Connected-*.dmg connected-desktop-macos.dmg

      - name: Upload macOS Build
        uses: actions/upload-artifact@v7
        with:
          path: connected-desktop-macos.dmg
          archive: false

  # -------------------------------------------------------------------------
  # Job 10: Build Android App
  # -------------------------------------------------------------------------
  build-android:
    name: Android Build
    runs-on: ubuntu-latest
    needs: [pre-commit, quality, security]
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 26
        uses: actions/setup-java@v5
        with:
          java-version: "26"
          distribution: "temurin"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: aarch64-linux-android, armv7-linux-androideabi, x86_64-linux-android, i686-linux-android

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "android-build"

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build with Gradle
        working-directory: android
        run: ./gradlew assembleStandaloneDebug

      - name: Prepare Android artifact
        run: cp android/app/build/outputs/apk/standalone/debug/app-standalone-debug.apk connected-android.apk

      - name: Upload Android Build
        uses: actions/upload-artifact@v7
        with:
          path: connected-android.apk
          archive: false

  # -------------------------------------------------------------------------
  # Job 11: Build iOS IPA
  # -------------------------------------------------------------------------
  build-ios:
    name: iOS Build
    runs-on: macos-26
    needs: [pre-commit, quality, security]
    if: github.event_name != 'schedule'
    env:
      IOS_BUILD_NUMBER: ${{ vars.IOS_BUILD_NUMBER }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: aarch64-apple-ios, aarch64-apple-ios-sim, x86_64-apple-ios

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ios-build"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Sync iOS version
        run: bash scripts/ios/sync-version.sh

      - name: Generate Swift bindings
        run: bash scripts/ios/generate-bindings.sh

      - name: Build Rust iOS framework
        run: bash scripts/ios/build-rust-ios.sh

      - name: Detect iOS signing
        id: ios_signing
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_DEV_PROVISIONING_PROFILE: ${{ secrets.IOS_DEV_PROVISIONING_PROFILE }}
        run: |
          if [[ -n "$APPLE_TEAM_ID" && -n "$IOS_CERTIFICATE" && -n "$IOS_CERTIFICATE_PASSWORD" && -n "$IOS_DEV_PROVISIONING_PROFILE" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install iOS signing assets
        if: steps.ios_signing.outputs.available == 'true'
        run: bash scripts/ios/install-signing.sh
        env:
          IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_DEV_PROVISIONING_PROFILE: ${{ secrets.IOS_DEV_PROVISIONING_PROFILE }}

      - name: Build iOS IPA
        run: bash scripts/ios/archive-ipa.sh
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_CONFIGURATION: Debug
          IOS_EXPORT_METHOD: release-testing
          IOS_IPA_NAME: connected-ios.ipa

      - name: Upload iOS IPA
        uses: actions/upload-artifact@v7
        with:
          name: connected-ios.ipa
          path: connected-ios.ipa
          archive: false
