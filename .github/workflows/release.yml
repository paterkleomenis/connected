name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  # -------------------------------------------------------------------------
  # Job 1: Build Linux Desktop
  # -------------------------------------------------------------------------
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "linux-build"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev pkg-config libdbus-1-dev libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev

      - name: Build Release
        run: cargo build --release --verbose

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v7
        with:
          path: target/release/connected-desktop
          archive: false

  # -------------------------------------------------------------------------
  # Job 2: Build Flatpak
  # -------------------------------------------------------------------------
  build-flatpak:
    name: Build Flatpak
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged
    steps:
      - uses: actions/checkout@v6

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: com.paterkleomenis.Connected.flatpak
          manifest-path: packaging/flatpak/com.paterkleomenis.Connected.yml

  # -------------------------------------------------------------------------
  # Job 3: Build AppImage
  # -------------------------------------------------------------------------
  build-appimage:
    name: Build AppImage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "linux-build"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev pkg-config libdbus-1-dev libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev fuse libfuse2 zsync

      - name: Build AppImage
        run: |
          chmod +x packaging/linux/build-appimage.sh
          packaging/linux/build-appimage.sh --release

      - name: Upload AppImage Artifact
        uses: actions/upload-artifact@v7
        with:
          name: connected-appimage
          path: |
            target/connected-desktop-x86_64.AppImage
            target/connected-desktop-x86_64.AppImage.zsync
          if-no-files-found: error

  # -------------------------------------------------------------------------
  # Job 4: Build Windows MSIX per architecture
  # -------------------------------------------------------------------------
  build-windows:
    name: Build Windows MSIX
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-pc-windows-msvc, aarch64-pc-windows-msvc]
    steps:
      - uses: actions/checkout@v6

      - name: Verify tag matches Cargo version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag.TrimStart("v")
          $cargoMatch = (Get-Content Cargo.toml | Select-String -Pattern '^\s*version\s*=\s*"([^"]+)"' -AllMatches | Select-Object -Last 1)
          if ($null -eq $cargoMatch) { throw "Could not find workspace version in Cargo.toml" }
          $cargo = $cargoMatch.Matches[0].Groups[1].Value
          if ($cargo -ne $ver) {
            throw "Tag version ($ver) does not match Cargo.toml workspace version ($cargo)."
          }

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Configure ARM64 Windows C toolchain
        if: matrix.target == 'aarch64-pc-windows-msvc'
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (!(Test-Path $vswhere)) { throw "vswhere.exe not found" }
          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Llvm.Clang -property installationPath
          if (-not $vsPath) {
            throw "Visual Studio LLVM component (clang-cl) is not installed on this runner"
          }

          $msvcToolsRoot = Join-Path $vsPath "VC\Tools\MSVC"
          if (!(Test-Path $msvcToolsRoot)) { throw "MSVC tools not found at $msvcToolsRoot" }
          $msvcVersionDir = Get-ChildItem -Path $msvcToolsRoot -Directory | Sort-Object Name -Descending | Select-Object -First 1
          if ($null -eq $msvcVersionDir) { throw "Could not locate an MSVC version under $msvcToolsRoot" }
          $msvcBinDir = Join-Path $msvcVersionDir.FullName "bin\Hostx64\arm64"
          $linker = Join-Path $msvcBinDir "link.exe"
          if (!(Test-Path $linker)) { throw "ARM64 linker not found at $linker" }

          $clangDir = Join-Path $vsPath "VC\Tools\Llvm\x64\bin"
          $clang = Join-Path $clangDir "clang-cl.exe"
          if (!(Test-Path $clang)) { throw "clang-cl.exe not found at $clang" }

          $llvmLib = Join-Path $clangDir "llvm-lib.exe"
          if (!(Test-Path $llvmLib)) { throw "llvm-lib.exe not found at $llvmLib" }

          "$clangDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "CC_aarch64_pc_windows_msvc=$clang" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CXX_aarch64_pc_windows_msvc=$clang" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "AR_aarch64_pc_windows_msvc=$llvmLib" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CARGO_TARGET_AARCH64_PC_WINDOWS_MSVC_LINKER=$linker" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "windows-build-${{ matrix.target }}"

      - name: Build Release
        shell: pwsh
        run: |
          if ("${{ matrix.target }}" -eq "x86_64-pc-windows-msvc") {
            cargo build --release --verbose
          } else {
            cargo build --target ${{ matrix.target }} --release --verbose
          }

      - name: Clean up WebView2 Ghost Languages
        shell: pwsh
        run: |
          Get-ChildItem -Path target/ -Recurse -Directory | Where-Object { $_.Name -match '^[a-z]{2}(-[A-Za-z]+)?$' -and (Test-Path "$($_.FullName)\WebView2Loader.dll.mui" -or Test-Path "$($_.FullName)\Microsoft.Web.WebView2.Core.dll.mui") } | Remove-Item -Recurse -Force

      - name: Build Windows x64 MSIX
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/build-msix.ps1 -Arch x64 -Profile release

      - name: Build Windows ARM64 MSIX
        if: matrix.target == 'aarch64-pc-windows-msvc'
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/build-msix.ps1 -Arch arm64 -Profile release

      - name: Upload Windows x64 MSIX
        if: matrix.target == 'x86_64-pc-windows-msvc'
        uses: actions/upload-artifact@v7
        with:
          path: target/msix/x64/connected-desktop-windows-x64.msix
          name: connected-desktop-windows-x64.msix
          archive: false

      - name: Upload Windows ARM64 MSIX
        if: matrix.target == 'aarch64-pc-windows-msvc'
        uses: actions/upload-artifact@v7
        with:
          path: target/msix/arm64/connected-desktop-windows-arm64.msix
          name: connected-desktop-windows-arm64.msix
          archive: false

  # -------------------------------------------------------------------------
  # Job 4: Bundle Windows MSIX
  # -------------------------------------------------------------------------
  bundle-windows-msix:
    name: Bundle Windows MSIX
    needs: [build-windows]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download Windows x64 MSIX
        uses: actions/download-artifact@v8
        with:
          name: connected-desktop-windows-x64.msix
          path: target/msix/x64

      - name: Download Windows ARM64 MSIX
        uses: actions/download-artifact@v8
        with:
          name: connected-desktop-windows-arm64.msix
          path: target/msix/arm64

      - name: Build MSIXUPLOAD
        shell: pwsh
        run: |
          ./scripts/build-msixupload-local.ps1 -SkipBuild -OutputDir target/msix

      - name: Upload Windows MSIXUPLOAD
        uses: actions/upload-artifact@v7
        with:
          path: target/msix/connected-desktop-windows.msixupload
          name: connected-desktop-windows.msixupload
          archive: false

  # -------------------------------------------------------------------------
  # Job 5: Build macOS Desktop
  # -------------------------------------------------------------------------
  build-macos:
    name: Build macOS
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "macos-build"

      - name: Build macOS App and DMG
        run: |
          chmod +x packaging/macos/build-macos.sh
          packaging/macos/build-macos.sh --release
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_DEVELOPER_ID_CERTIFICATE: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE }}
          APPLE_DEVELOPER_ID_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_PASSWORD }}
          APPLE_DEVELOPER_ID_TEAM_ID: ${{ secrets.APPLE_DEVELOPER_ID_TEAM_ID }}

      - name: Prepare macOS artifact
        run: cp target/macos-build/Connected-*.dmg connected-desktop.dmg

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v7
        with:
          path: connected-desktop.dmg
          archive: false

  # -------------------------------------------------------------------------
  # Job 6: Build Android APK / AAB
  # -------------------------------------------------------------------------
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: aarch64-linux-android, armv7-linux-androideabi, x86_64-linux-android, i686-linux-android

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "android-build"

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Build Release AAB
        working-directory: android
        run: ./gradlew bundleRelease
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Prepare Android APK artifact
        run: cp android/app/build/outputs/apk/release/app-release.apk connected-android.apk

      # Using v7 with archive: false means NO 'name:' key
      - name: Upload Android APK Artifact
        uses: actions/upload-artifact@v7
        with:
          path: connected-android.apk
          archive: false

      - name: Prepare Android AAB artifact
        run: cp android/app/build/outputs/bundle/release/app-release.aab connected-android.aab

      # Using v7 with archive: false means NO 'name:' key
      - name: Upload Android AAB Artifact
        uses: actions/upload-artifact@v7
        with:
          path: connected-android.aab
          archive: false

  # -------------------------------------------------------------------------
  # Job 7: Build iOS IPA
  # -------------------------------------------------------------------------
  build-ios:
    name: Build iOS
    runs-on: macos-26
    env:
      IOS_BUILD_NUMBER: ${{ vars.IOS_BUILD_NUMBER }}
    steps:
      - uses: actions/checkout@v6

      - name: Verify tag matches Cargo version
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          cargo_version="$(grep -E '^[[:space:]]*version[[:space:]]*=[[:space:]]*"[^"]+"' Cargo.toml | tail -1 | sed -E 's/.*"([^"]+)".*/\1/')"
          if [[ -z "$cargo_version" ]]; then
            echo "Could not find workspace version in Cargo.toml" >&2
            exit 1
          fi
          if [[ "$cargo_version" != "$version" ]]; then
            echo "Tag version ($version) does not match Cargo.toml workspace version ($cargo_version)." >&2
            exit 1
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: aarch64-apple-ios, aarch64-apple-ios-sim, x86_64-apple-ios

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ios-build"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Sync iOS version
        run: bash scripts/ios/sync-version.sh

      - name: Detect iOS signing
        id: ios_signing
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          if [[ -n "$APPLE_TEAM_ID" && -n "$IOS_CERTIFICATE" && -n "$IOS_CERTIFICATE_PASSWORD" && -n "$IOS_PROVISIONING_PROFILE" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install iOS signing assets
        if: steps.ios_signing.outputs.available == 'true'
        run: bash scripts/ios/install-signing.sh
        env:
          IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}

      - name: Generate Swift bindings
        run: bash scripts/ios/generate-bindings.sh

      - name: Build Rust iOS framework
        run: bash scripts/ios/build-rust-ios.sh
        env:
          IOS_RUST_PROFILE: release

      - name: Build iOS IPA
        run: bash scripts/ios/archive-ipa.sh
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v7
        with:
          name: connected-ios.ipa
          path: connected-ios.ipa
          archive: false

  # -------------------------------------------------------------------------
  # Job 8: Create Release
  # -------------------------------------------------------------------------
  create-release:
    name: Create GitHub Release
    needs:
      [
        build-linux,
        build-flatpak,
        build-appimage,
        bundle-windows-msix,
        build-macos,
        build-android,
        build-ios,
      ]
    runs-on: ubuntu-latest
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          name: Connected ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            connected-desktop
            com.paterkleomenis.Connected.flatpak
            connected-desktop-x86_64.AppImage
            connected-desktop-x86_64.AppImage.zsync
            connected-desktop-windows-x64.msix
            connected-desktop-windows-arm64.msix
            connected-android.apk
            connected-ios.ipa
            connected-desktop.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # -------------------------------------------------------------------------
  # Job 9: Update AUR
  # -------------------------------------------------------------------------
  update-aur:
    name: Update AUR
    needs: [create-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Update AUR package
        uses: docker://archlinux:latest
        with:
          args: >
            bash -c "
            pacman -Syu --noconfirm git base-devel curl sudo openssh &&
            useradd -m aur &&
            echo 'aur ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers &&
            chown -R aur:aur . &&
            su aur -c '
              mkdir -p ~/.ssh &&
              echo \"${{ secrets.AUR_SSH_PRIVATE_KEY }}\" > ~/.ssh/id_rsa &&
              chmod 600 ~/.ssh/id_rsa &&
              ssh-keyscan -t ed25519 aur.archlinux.org >> ~/.ssh/known_hosts &&
              git config --global user.name \"GitHub Actions\" &&
              git config --global user.email \"actions@github.com\" &&
              bash scripts/update-aur.sh ${{ github.ref_name }} --push --remote ssh://aur@aur.archlinux.org/connected-desktop-bin.git
            '"

  # -------------------------------------------------------------------------
  # Job 10: Publish to Google Play
  # -------------------------------------------------------------------------
  publish-play-store:
    name: Publish to Google Play
    needs: [build-android]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v6

      # v8 downloads the unzipped file directly into the target directory
      - name: Download Android AAB
        uses: actions/download-artifact@v8
        with:
          name: connected-android.aab
          path: .

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1.1.5
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: com.connected.app.sync
          releaseFiles: connected-android.aab
          track: ${{ vars.PLAY_STORE_TRACK || 'production' }}
          status: ${{ vars.PLAY_STORE_STATUS || 'completed' }}
          changesNotSentForReview: ${{ vars.PLAY_STORE_CHANGES_NOT_SENT_FOR_REVIEW || 'false' }}

  # -------------------------------------------------------------------------
  # Job 11: Publish to Microsoft Store
  # -------------------------------------------------------------------------
  publish-microsoft-store:
    name: Publish to Microsoft Store
    needs: [bundle-windows-msix]
    runs-on: windows-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v6

      - name: Download Windows MSIXUPLOAD
        uses: actions/download-artifact@v8
        with:
          name: connected-desktop-windows.msixupload
          path: .

      - name: Setup MSStore CLI
        uses: microsoft/setup-msstore-cli@v1

      - name: Configure MSStore CLI
        shell: pwsh
        run: |
          msstore --version

          msstore reconfigure `
            --tenantId "${{ secrets.STORE_TENANT_ID }}" `
            --sellerId "${{ secrets.STORE_SELLER_ID }}" `
            --clientId "${{ secrets.STORE_CLIENT_ID }}" `
            --clientSecret "${{ secrets.STORE_CLIENT_SECRET }}"

      - name: Delete pending Microsoft Store submission
        shell: pwsh
        continue-on-error: true
        run: msstore submission delete "${{ secrets.STORE_APP_ID }}" --no-confirm

      - name: Submit to Microsoft Store
        shell: pwsh
        run: |
          Get-ChildItem -Path . -Filter *.msixupload | Format-Table Name,Length

          msstore publish "connected-desktop-windows.msixupload" `
            --appId "${{ secrets.STORE_APP_ID }}"
