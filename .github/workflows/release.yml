name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: read
  actions: read

jobs:
  publish-microsoft-store:
    name: Publish to Microsoft Store
    runs-on: windows-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Find previous release run with MSIXUPLOAD
        id: find-msixupload
        uses: actions/github-script@v7
        with:
          script: |
            const artifactName = "connected-desktop-windows.msixupload";
            const workflowId = "release.yml";
            const maxRunsToCheck = 20;
            const { owner, repo } = context.repo;
            const currentRunId = context.runId;

            const { data } = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: workflowId,
              event: "push",
              status: "completed",
              per_page: maxRunsToCheck,
            });

            for (const run of data.workflow_runs) {
              if (run.id === currentRunId) {
                continue;
              }

              const { data: artifactsData } = await github.rest.actions.listWorkflowRunArtifacts({
                owner,
                repo,
                run_id: run.id,
                per_page: 100,
              });

              const artifact = artifactsData.artifacts.find(
                (candidate) => candidate.name === artifactName && !candidate.expired,
              );

              if (!artifact) {
                continue;
              }

              core.info(`Using ${artifactName} from run ${run.id} (${run.html_url})`);
              core.setOutput("run-id", String(run.id));
              core.setOutput("artifact-name", artifactName);
              core.setOutput("run-url", run.html_url);
              return;
            }

            core.setFailed(`No ${artifactName} artifact found in the last ${maxRunsToCheck} completed ${workflowId} runs.`);

      - name: Download Windows MSIXUPLOAD from previous run
        uses: actions/download-artifact@v8
        with:
          name: ${{ steps.find-msixupload.outputs.artifact-name }}
          run-id: ${{ steps.find-msixupload.outputs.run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: .

      - name: Show artifact source
        shell: pwsh
        run: |
          Write-Host "Artifact source run: ${{ steps.find-msixupload.outputs.run-url }}"
          Get-ChildItem -Path . -Filter *.msixupload | Format-Table Name, Length

      - name: Setup MSStore CLI
        uses: microsoft/setup-msstore-cli@v1

      - name: Submit to Microsoft Store
        shell: pwsh
        run: |
          msstore --version

          msstore reconfigure `
            --tenantId "${{ secrets.STORE_TENANT_ID }}" `
            --sellerId "${{ secrets.STORE_SELLER_ID }}" `
            --clientId "${{ secrets.STORE_CLIENT_ID }}" `
            --clientSecret "${{ secrets.STORE_CLIENT_SECRET }}"

          $package = Get-ChildItem -Path . -Filter *.msixupload | Select-Object -First 1
          if ($null -eq $package) {
            throw "No .msixupload package was downloaded."
          }
          Write-Host "Publishing package: $($package.FullName)"

          msstore publish "$($package.FullName)" `
            --appId "${{ secrets.STORE_APP_ID }}" `
            --verbose
