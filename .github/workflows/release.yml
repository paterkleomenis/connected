name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  # -------------------------------------------------------------------------
  # Job 1: Build Linux Desktop
  # -------------------------------------------------------------------------
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "linux-build"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev pkg-config libdbus-1-dev libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev

      - name: Build Release
        run: cargo build --release --verbose

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v7
        with:
          path: target/release/connected-desktop
          archive: false

  # -------------------------------------------------------------------------
  # Job 2: Build Windows Desktop
  # -------------------------------------------------------------------------
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify tag matches Cargo version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag.TrimStart("v")
          $cargoMatch = (Get-Content Cargo.toml | Select-String -Pattern '^\s*version\s*=\s*"([^"]+)"' -AllMatches | Select-Object -Last 1)
          if ($null -eq $cargoMatch) { throw "Could not find workspace version in Cargo.toml" }
          $cargo = $cargoMatch.Matches[0].Groups[1].Value
          if ($cargo -ne $ver) {
            throw "Tag version ($ver) does not match Cargo.toml workspace version ($cargo)."
          }

      - name: Verify installer.wxs matches Cargo version
        shell: pwsh
        run: |
          $cargoMatch = (Get-Content Cargo.toml | Select-String -Pattern '^\s*version\s*=\s*"([^"]+)"' -AllMatches | Select-Object -Last 1)
          if ($null -eq $cargoMatch) { throw "Could not find workspace version in Cargo.toml" }
          $cargoVer = $cargoMatch.Matches[0].Groups[1].Value
          $wxsMatch = (Get-Content packaging/windows/installer.wxs | Select-String -Pattern "^\s*Version=['`"`]([^'`"`]+)['`"`]")
          if ($null -eq $wxsMatch) { throw "Could not find Version in installer.wxs" }
          $wxsVer = $wxsMatch.Matches[0].Groups[1].Value
          if ($wxsVer -ne $cargoVer) {
            throw "installer.wxs Version ($wxsVer) does not match Cargo.toml workspace version ($cargoVer)."
          }
          Write-Host "✅ installer.wxs version ($wxsVer) matches Cargo.toml ($cargoVer)"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "windows-build"

      - name: Build Release
        run: cargo build --release --verbose

      - name: Verify built EXE version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag.TrimStart("v")
          $exe = "target\\release\\connected-desktop.exe"
          if (!(Test-Path $exe)) { throw "Missing $exe" }
          $fileVer = (Get-Item $exe).VersionInfo.FileVersion
          if (-not $fileVer.StartsWith($ver)) {
            throw "Built EXE FileVersion ($fileVer) does not match tag ($ver)."
          }

      - name: Ensure WebView2Loader.dll present (MSI)
        shell: pwsh
        run: |
          $dll = "target\\release\\WebView2Loader.dll"
          if (!(Test-Path $dll)) {
            $src = Get-ChildItem -Path "target\\release\\build" -Recurse -Filter "WebView2Loader.dll" |
              Where-Object { $_.FullName -match "\\\\out\\\\x64\\\\WebView2Loader\\.dll$" } |
              Select-Object -First 1
            if ($null -eq $src) { throw "WebView2Loader.dll not found under target\\release\\build\\**\\out\\x64\\WebView2Loader.dll" }
            Copy-Item $src.FullName $dll -Force
          }
          Write-Host "WebView2Loader.dll ready at $dll"

      - name: Cache WiX
        uses: actions/cache@v5
        id: wix-cache
        with:
          path: ~/.dotnet/tools
          key: wix-${{ hashFiles('packaging/windows/installer.wxs') }}

      - name: Install WiX 4
        if: steps.wix-cache.outputs.cache-hit != 'true'
        run: dotnet tool install --global wix

      - name: Create WiX Output Directory
        shell: pwsh
        run: mkdir target/wix -Force

      - name: Package MSI
        run: wix build packaging/windows/installer.wxs -o target/wix/connected-desktop.msi

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v7
        with:
          path: target/wix/connected-desktop.msi
          archive: false

  # -------------------------------------------------------------------------
  # Job 3: Build macOS Desktop
  # -------------------------------------------------------------------------
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "macos-build"

      - name: Build macOS App and DMG
        run: |
          chmod +x packaging/macos/build-macos.sh
          packaging/macos/build-macos.sh --release
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_DEVELOPER_ID_CERTIFICATE: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE }}
          APPLE_DEVELOPER_ID_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_PASSWORD }}
          APPLE_DEVELOPER_ID_TEAM_ID: ${{ secrets.APPLE_DEVELOPER_ID_TEAM_ID }}

      - name: Prepare macOS artifact
        run: cp target/macos-build/Connected-*.dmg connected-desktop.dmg

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v7
        with:
          path: connected-desktop.dmg
          archive: false

  # -------------------------------------------------------------------------
  # Job 4: Build Android APK
  # -------------------------------------------------------------------------
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 26
        uses: actions/setup-java@v5
        with:
          java-version: "26"
          distribution: "temurin"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: aarch64-linux-android, armv7-linux-androideabi, x86_64-linux-android, i686-linux-android

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "android-build"

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Prepare Android artifact
        run: cp android/app/build/outputs/apk/release/app-release.apk connected-android.apk

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v7
        with:
          path: connected-android.apk
          archive: false

  # -------------------------------------------------------------------------
  # Job 5: Create Release
  # -------------------------------------------------------------------------
  create-release:
    name: Create GitHub Release
    needs: [build-linux, build-windows, build-macos, build-android]
    runs-on: ubuntu-latest
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Connected ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            connected-desktop
            connected-desktop.msi
            connected-android.apk
            connected-desktop.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
