app-id: com.paterkleomenis.Connected
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
sdk-extensions: []
command: connected-desktop
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  # Do not expose a Wayland socket, we'll use the host's.
  - --nosocket=wayland
  # Sockets 0 ... 32. A reasonable amount, per the Wayland server
  # implementation: https://wayland.freedesktop.org/docs/html/apc.html,
  # in function wl_display_add_socket_auto.
  - --filesystem=xdg-run/wayland-0
  - --filesystem=xdg-run/wayland-1
  - --filesystem=xdg-run/wayland-2
  - --filesystem=xdg-run/wayland-3
  - --filesystem=xdg-run/wayland-4
  - --filesystem=xdg-run/wayland-5
  - --filesystem=xdg-run/wayland-6
  - --filesystem=xdg-run/wayland-7
  - --filesystem=xdg-run/wayland-8
  - --filesystem=xdg-run/wayland-9
  - --filesystem=xdg-run/wayland-10
  - --filesystem=xdg-run/wayland-11
  - --filesystem=xdg-run/wayland-12
  - --filesystem=xdg-run/wayland-13
  - --filesystem=xdg-run/wayland-14
  - --filesystem=xdg-run/wayland-15
  - --filesystem=xdg-run/wayland-16
  - --filesystem=xdg-run/wayland-17
  - --filesystem=xdg-run/wayland-18
  - --filesystem=xdg-run/wayland-19
  - --filesystem=xdg-run/wayland-20
  - --filesystem=xdg-run/wayland-21
  - --filesystem=xdg-run/wayland-22
  - --filesystem=xdg-run/wayland-23
  - --filesystem=xdg-run/wayland-24
  - --filesystem=xdg-run/wayland-25
  - --filesystem=xdg-run/wayland-26
  - --filesystem=xdg-run/wayland-27
  - --filesystem=xdg-run/wayland-28
  - --filesystem=xdg-run/wayland-29
  - --filesystem=xdg-run/wayland-30
  - --filesystem=xdg-run/wayland-31
  - --filesystem=xdg-run/wayland-32
  # Why, Canonical?
  # https://canonical.com/mir/docs/stable/tutorial/write-your-first-wayland-compositor/#run-the-compositor
  - --filesystem=xdg-run/wayland-99
  - --device=dri
  - --filesystem=host
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.mpris.MediaPlayer2.*
  - --own-name=org.mpris.MediaPlayer2.connected
  - --talk-name=org.kde.StatusNotifierWatcher
build-options:
  build-args:
    - --share=network
  env:
    CARGO_HOME: /run/build/connected/cargo
    RUSTUP_HOME: /run/build/connected/rustup
modules:
  - name: connected
    buildsystem: simple
    build-commands:
      # Install Rust manually to get the latest stable version
      - |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --no-modify-path
        export PATH="/run/build/connected/cargo/bin:$PATH"

        # Build the desktop component
        cargo build --release -p connected-desktop

      # Install the binary
      - install -Dm755 target/release/connected-desktop /app/bin/connected-desktop-bin
      - install -Dm755 packaging/flatpak/connected-desktop-wayland-socket /app/bin/connected-desktop
      # Install the desktop file
      - install -Dm644 packaging/flatpak/com.paterkleomenis.Connected.desktop /app/share/applications/com.paterkleomenis.Connected.desktop

      # Install the metainfo file
      - install -Dm644 packaging/flatpak/com.paterkleomenis.Connected.metainfo.xml /app/share/metainfo/com.paterkleomenis.Connected.metainfo.xml

      # Install the icon
      - install -Dm644 packaging/flatpak/com.paterkleomenis.Connected.png /app/share/icons/hicolor/512x512/apps/com.paterkleomenis.Connected.png
    sources:
      - type: dir
        path: ../..
