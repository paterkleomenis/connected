# COPR package configuration for connected-desktop
# This file is used by update-copr.sh to manage the COPR package

# COPR project name (user/project format)
COPR_PROJECT="paterkleomenis/connected"

# COPR chroots to build for
COPR_CHROOTS="fedora-43-x86_64 fedora-43-aarch64 fedora-44-x86_64 fedora-rawhide-x86_64 fedora-rawhide-aarch64"

# Source RPM URL template (GitHub release)
SOURCE_RPM_URL="https://github.com/paterkleomenis/connected/releases/download/{version}/connected-desktop-{arch}.rpm"

# Architectures to build
ARCHITECTURES="x86_64 aarch64"
