name: Connected
options:
  createIntermediateGroups: true
  minimumXcodeGenVersion: 2.38.0

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: 5.10
    IPHONEOS_DEPLOYMENT_TARGET: 16.0
    MARKETING_VERSION: 2.9.3
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  Connected:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Connected/App
      - path: Connected/Core
      - path: Connected/Views
      - path: Connected/Generated/Uniffi
        excludes:
          - "**/*.h"
          - "**/*.modulemap"
      - path: Connected/Support/Connected-Bridging-Header.h
        buildPhase: none
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.connected.ios
        PRODUCT_NAME: Connected
        INFOPLIST_FILE: Connected/Support/Info.plist
        SWIFT_OBJC_BRIDGING_HEADER: Connected/Support/Connected-Bridging-Header.h
        SWIFT_INCLUDE_PATHS:
          - $(SRCROOT)/Connected/Generated/Uniffi
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/Connected/Generated/Uniffi
        FRAMEWORK_SEARCH_PATHS:
          - $(SRCROOT)/Vendor
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - framework: Vendor/connected_ffi.xcframework
